let lines = 0;
function log(message) {
    document.getElementById("log").innerHTML +=
        "<p>" + message + "</p>";
}
function show() {
    document.getElementById("money").innerHTML =
        "<p>" + "MI Assets: " + mi.money + "</p>";
}
function update() {
    const log = document.getElementById("log");
    if (lines > 10) {
        log.removeChild(log.firstElementChild);
        lines--;
    }
}
show();
function receiveMoney() {

    const amount =
        Number(document.getElementById("moneyInput").value);
    mi.money+=amount;
    show();

    log("MI received $" + amount);
    lines+=1

}

    const amount =
        Number(document.getElementById("payInput").value);
    mi.money-=amount;
    show();

    log("MI paid $" + amount);
    lines+=1
    update();
}
function property() {
    const match = containsProperty(
        document.getElementById("propertyName").value
    );

    if (match) {
        evaluateProperty(match);
        return;
    }

    const property = {
        color: document.getElementById("propertyColor").value,
        name: document.getElementById("propertyName").value,
        cost: Number(document.getElementById("propertyCost").value),
        rent: Number(document.getElementById("baseRent").value),

        rent4: Number(document.getElementById("4Rent").value),
        Hrent: Number(document.getElementById("HRent").value),
        buildCost: Number(document.getElementById("buildCost").value)
    };

    evaluateProperty(property);
}

    );

	log("MI receives " + match.name);
	lines++;

        return;
    }

        name: document.getElementById("propertyName").value,

    lines++;

}
function auctionProperty() {
    const match = containsProperty(
        document.getElementById("propertyName").value
    );

    if (match) {
	let auctionMax = Math.round(match.cost * (2/3));
        if (mi.money - auctionMax <= 200) {
	    auctionMax += 200 - (mi.money - auctionMax);
        }
        log("MI auctions " + match.name + ", MI will at maximum bid $" + auctionMax);
        lines++;
        update();
        return;
    }

    const property = {
        color: document.getElementById("propertyColor").value,
        name: document.getElementById("propertyName").value,
        cost: Number(document.getElementById("propertyCost").value),
        rent: Number(document.getElementById("baseRent").value),
        rentFull: Number(document.getElementById("baseRent").value) * 2,
        rent1: Number(document.getElementById("1Rent").value),
        rent2: Number(document.getElementById("2Rent").value),
        rent3: Number(document.getElementById("3Rent").value),
        rent4: Number(document.getElementById("4Rent").value),
        Hrent: Number(document.getElementById("HRent").value),
        buildCost: Number(document.getElementById("buildCost").value)
    };
    let auctionMax = Math.round(property.cost * (2/3));
    if (mi.money - auctionMax <= 200) {
	auctionMax += 200 - (mi.money - auctionMax);
    }
    log("MI auctions " + property.name + ", MI will at maximum bid $" + auctionMax);
    lines++;
    update();
}
function evaluateProperty(property) {
    if (mi.properties.some(obj => obj.color === property.color)) {
	const count = remainingInSet(property);
	if (count === 1) {
	    if (mi.money - property.cost >= 100) {
		buy(property);
		return;
	    }
	} else {
	    if (mi.money - property.cost >= 150) {
		buy(property);
		return;
	    }
	}
    }
    if (property.Hrent > 600 && property.Hrent / property.cost >= 4 && mi.money - property.cost >= 250) {
		if (mi.properties.length < 5 || property.Hrent >= 1500) {
			buy(property);
			return;
		}
    }
    let auctionMax = Math.min(Math.round(property.cost * (2/3)), mi.money - 200);
    log("MI auctions " + property.name + ", MI will at maximum bid $" + auctionMax);
    lines++;
    update();
    return;
}
function containsProperty(input) {
    const normalizedInput = input
        .toLowerCase()
        .replaceAll(" ", "")
        .replaceAll(".", "");

    return monopolyProperties.find(property => {
        const normalizedName = property.name
            .toLowerCase()
            .replaceAll(" ", "")
            .replaceAll(".", "");

        return normalizedInput.includes(normalizedName) ||
               normalizedName.includes(normalizedInput);
    });
}
function remainingInSet(property) {
    const owned = mi.properties.filter(obj => obj.color === property.color).length;
    const exception = exceptions.find(obj => obj.color === property.color);

    if (exception) {
        return exception.amount - owned;
    }

    return 3 - owned;
}
function mortgage() {
    if (mi.money >= 100) return;

    // Count owned properties by color
    let colors = [];

    mi.properties.forEach(property => {
        const color = colors.find(obj => obj.color === property.color);

        if (!color) {
            colors.push({
                color: property.color,
                amount: 1
            });
        } else {
            color.amount++;
        }
    });

    // Mortgage singleton colors first
    for (const color of colors.filter(c => c.amount === 1)) {
        if (mi.money >= 100) break;

        const property = mi.properties.find(
            p => p.color === color.color && !p.mortgaged
        );

        if (property) {
            property.mortgaged = true;
            mi.money += property.cost / 2;
            show();

            log("MI mortgages " + property.name +
                " for $" + (property.cost / 2));
            lines++;
            update();
        }
    }

    // Mortgage remaining cheapest properties if needed
    if (mi.money < 100) {
        const remaining = mi.properties
            .filter(p => !p.mortgaged)
            .sort((a, b) => a.cost - b.cost);

        for (const property of remaining) {
            if (mi.money >= 100) break;

            property.mortgaged = true;
            mi.money += property.cost / 2;
            show();

            log("MI mortgages " + property.name +
                " for $" + (property.cost / 2));
            lines++;
            update();
        }
    }
}
function buy(property) {
    mi.properties.push(property);
    mi.money -= property.cost;
    show();
    log("MI purchases " + property.name + " for $" + property.cost);
    lines++;
    update();
}
function run() {
	requestAnimationFrame(update);
}
